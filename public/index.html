<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Teacher Availability System | Login</title>

    <!-- Font Awesome for Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="main-container">

        <!-- Left Side: Branding -->

        <section class="left-side">

            <div class="branding-content">

                <div class="logo-icon">

                    <i class="fas fa-graduation-cap"></i>

                </div>

                <h1>Teacher Availability System</h1>

                <p>Manage teacher availability and book appointments easily. A smart digital solution for a modern campus.</p>

                <div class="illustration">

                    <!-- Simple CSS-based illustration or icon -->

                    <i class="fas fa-calendar-check-pulse"></i>

                </div>

            </div>

        </section>



        <!-- Right Side: Form -->

        <section class="right-side">

            <div class="auth-card">

                <div class="form-header">

                    <h2 id="auth-title">Create Account</h2>

                    <p id="auth-subtitle">Join our academic community today</p>

                </div>



                <form id="auth-form">

                    <div class="input-field" id="name-field">

                        <i class="fas fa-user"></i>

                        <input type="text" id="name" placeholder="Full Name">

                    </div>



                    <div class="input-field">

                        <i class="fas fa-envelope"></i>

                        <input type="email" id="email" placeholder="name@university.edu" required>

                    </div>



                    <div class="input-field">

                        <i class="fas fa-lock"></i>

                        <input type="password" id="password" placeholder="Password" minlength="6" required>

                        <i class="fas fa-eye toggle-password" id="eye-icon"></i>

                    </div>



                    <div class="input-field">

                        <i class="fas fa-user-tag"></i>

                        <select id="role">

                            <option value="" disabled selected>Select your role</option>

                            <option value="student">Student (@student.edu)</option>

                            <option value="teacher">Teacher (@teacher.edu)</option>

                        </select>

                    </div>



                    <div id="error-message" class="error-text"></div>



                    <button type="submit" class="btn-gradient" id="auth-btn">

                        <span>Sign Up</span>

                        <i class="fas fa-arrow-right"></i>

                    </button>

                </form>



                <p class="toggle-link">

                    <span id="toggle-desc">Already have an account?</span>

                    <a href="javascript:void(0)" onclick="toggleAuth()" id="toggle-action">Login</a>

                </p>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
