<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | TAS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: block; height: auto;">
    <main class="main-container" style="flex-direction: column; overflow-y: auto;">
        <header style="background: var(--primary-grad); padding: 20px 40px; color: white; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-weight: 700;"><i class="fas fa-graduation-cap"></i> Student Portal</h2>
            <a href="#" onclick="logout()" style="color: white; text-decoration: none; font-weight: 600;">Logout</a>
        </header>

        <section style="padding: 40px; display: flex; flex-direction: column; align-items: center;">
            <div class="form-header" style="text-align: center;">
                <h2>Search Faculty</h2>
                <p>Real-time availability based on timetable and manual updates</p>
            </div>

            <div class="input-field" style="width: 100%; max-width: 600px; margin-bottom: 30px;">
                <i class="fas fa-search"></i>
                <input type="text" id="teacherSearch" placeholder="Search teacher, department, or cabin..." onkeyup="filterTeachers()">
            </div>

            <div id="teacher-list" style="width: 100%; max-width: 800px;">
                </div>
        </section>
    </main>

    <script>
        let allTeachers = []; // Store teachers here for searching

async function fetchTeachers() {
    try {
        const res = await fetch('http://localhost:5000/api/student/teachers');
        allTeachers = await res.json();
        renderTeachers(allTeachers);
    } catch (err) {
        console.error("Failed to load teachers. Check if backend is running.");
    }
}

function renderTeachers(teachers) {
    const container = document.getElementById('teacher-list');
    
    if (teachers.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:var(--text-muted);">No faculty found matching your search.</p>`;
        return;
    }

    container.innerHTML = teachers.map(t => `
        <div class="auth-card teacher-card" style="max-width: 100%; margin-bottom: 15px; padding: 25px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid ${getStatusColor(t.status)}">
            <div>
                <h3 style="color: var(--text-main); margin-bottom: 4px;">${t.name}</h3>
                <p style="font-size: 0.9rem; color: var(--text-muted);"><i class="fas fa-building" style="margin-right: 8px;"></i>${t.cabin}</p>
                <p style="font-size: 0.8rem; color: #6366f1; font-weight: 600; text-transform: uppercase;">${t.department}</p>
            </div>
            <div style="text-align: right;">
                <span style="background: ${getBgColor(t.status)}; color: ${getStatusColor(t.status)}; padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 800;">● ${t.status.toUpperCase()}</span>
            </div>
        </div>
    `).join('');
}

// Search Logic
document.getElementById('teacherSearch').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allTeachers.filter(t => 
        t.name.toLowerCase().includes(term) || 
        t.department.toLowerCase().includes(term) || 
        t.cabin.toLowerCase().includes(term)
    );
    renderTeachers(filtered);
});

function getStatusColor(status) {
    const colors = { 'Available': '#10b981', 'In Class': '#ef4444', 'Busy': '#ef4444', 'In Meeting': '#f59e0b', 'Off Campus': '#64748b' };
    return colors[status] || '#64748b';
}

function getBgColor(status) {
    const bgs = { 'Available': '#d1fae5', 'In Class': '#fee2e2', 'Busy': '#fee2e2', 'In Meeting': '#fef3c7', 'Off Campus': '#f1f5f9' };
    return bgs[status] || '#f1f5f9';
}

function logout() {
    localStorage.clear();
    window.location.href = 'index.html';
}

// Initial load and auto-refresh
fetchTeachers();
setInterval(fetchTeachers, 30000);
    </script>
</body>
</html>
